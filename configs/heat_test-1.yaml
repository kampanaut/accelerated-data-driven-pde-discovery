# Heat Equation Test Configuration v1
# 30 tasks: 8 gb + 8 mb + 7 rp + 7 ss

simulation:
  name: "heat_test-1"
  D: 1.0
  domain_size: [6.283185307179586, 6.283185307179586]
  resolution: [128, 128]
  t_end: 5.0
  dt: 0.01
  save_interval: 0.1

output:
  base_dir: "data/datasets"

