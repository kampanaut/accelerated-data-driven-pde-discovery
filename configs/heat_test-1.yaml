# Heat Equation Test Configuration v1
# 27 tasks: 7 gb + 7 mb + 7 rp + 6 ss

simulation:
  name: "heat_test-1"
  D: 1.0
  domain_size: [6.283185307179586, 6.283185307179586]
  resolution: [512, 512]
  t_end: 5.0
  dt: 0.005
  save_interval: 0.1

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== gaussian_bump (gb) — 7 tasks ==========
  - {name: "heat_gb_t01", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.25, amplitude: 1.3, seed: 5210001}
  - {name: "heat_gb_t02", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.45, amplitude: 0.7, seed: 5210002}
  - {name: "heat_gb_t03", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.6, amplitude: 1.6, seed: 5210003}
  - {name: "heat_gb_t04", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.35, amplitude: 1.9, seed: 5210004}
  - {name: "heat_gb_t05", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.7, amplitude: 1.0, seed: 5210005}
  - {name: "heat_gb_t06", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.4, amplitude: 1.2, seed: 5210006}
  - {name: "heat_gb_t07", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.5, amplitude: 0.5, seed: 5210007}

  # ========== multi_bump (mb) — 7 tasks ==========
  - {name: "heat_mb_t01", type: "multi_bump", D: [0.1, 2.0], n_bumps: 3, sigma_range: [0.2, 0.5], seed: 5220001}
  - {name: "heat_mb_t02", type: "multi_bump", D: [0.1, 2.0], n_bumps: 5, sigma_range: [0.3, 0.7], seed: 5220002}
  - {name: "heat_mb_t03", type: "multi_bump", D: [0.1, 2.0], n_bumps: 2, sigma_range: [0.2, 0.8], seed: 5220003}
  - {name: "heat_mb_t04", type: "multi_bump", D: [0.1, 2.0], n_bumps: 4, sigma_range: [0.15, 0.5], seed: 5220004}
  - {name: "heat_mb_t05", type: "multi_bump", D: [0.1, 2.0], n_bumps: 6, sigma_range: [0.2, 0.6], seed: 5220005}
  - {name: "heat_mb_t06", type: "multi_bump", D: [0.1, 2.0], n_bumps: 3, sigma_range: [0.3, 0.6], seed: 5220006}
  - {name: "heat_mb_t07", type: "multi_bump", D: [0.1, 2.0], n_bumps: 8, sigma_range: [0.1, 0.4], seed: 5220007}

  # ========== random_perturbation (rp) — 7 tasks ==========
  - {name: "heat_rp_t01", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.5, n_modes: 8, seed: 5230001}
  - {name: "heat_rp_t02", type: "random_perturbation", D: [0.1, 2.0], amplitude: 1.0, n_modes: 15, seed: 5230002}
  - {name: "heat_rp_t03", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.3, n_modes: 6, seed: 5230003}
  - {name: "heat_rp_t04", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.7, n_modes: 12, seed: 5230004}
  - {name: "heat_rp_t05", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.9, n_modes: 10, seed: 5230005}
  - {name: "heat_rp_t06", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.4, n_modes: 18, seed: 5230006}
  - {name: "heat_rp_t07", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.6, n_modes: 7, seed: 5230007}

  # ========== sine_superposition (ss) — 6 tasks ==========
  - {name: "heat_ss_t01", type: "sine_superposition", D: [0.1, 2.0], modes: 2, seed: 5240001}
  - {name: "heat_ss_t02", type: "sine_superposition", D: [0.1, 2.0], modes: 3, seed: 5240002}
  - {name: "heat_ss_t03", type: "sine_superposition", D: [0.1, 2.0], modes: 4, seed: 5240003}
  - {name: "heat_ss_t04", type: "sine_superposition", D: [0.1, 2.0], modes: 5, seed: 5240004}
  - {name: "heat_ss_t05", type: "sine_superposition", D: [0.1, 2.0], modes: 6, seed: 5240005}
  - {name: "heat_ss_t06", type: "sine_superposition", D: [0.1, 2.0], modes: 3, seed: 5240006}
