# Brusselator Test Configuration
# Literature-validated parameters for Turing pattern formation
#
# Reference: Physics Forums discussion + Peña & Pérez-García (2001)
# Turing threshold: k2_c = (1 + k1 * sqrt(D_A/D_B))^2
#
# With k1=4.5, D_A=2, D_B=16:
#   k2_c = (1 + 4.5 * sqrt(2/16))^2 ≈ 6.7
#
# Pattern regimes (verified experimentally):
#   k2 ≈ 6.75 (just above threshold, small μ) → hexagonal spots (Hπ)
#   k2 ≈ 7.5 (farther from threshold, moderate μ) → labyrinthine stripes

simulation:
  name: "brusselator_test"

  # Literature-tested base parameters
  D_A: 2.0
  D_B: 16.0
  k1: 4.5
  k2: 7.0  # Above threshold (~6.7), will be overridden per-task

  # Domain (50 × 50 as in literature)
  domain_size: [50.0, 50.0]
  resolution: [64, 64]

  # Time integration
  # Implicit diffusion is unconditionally stable
  # Keep dt small enough for reaction term stability
  t_end: 200.0       # Long enough for patterns to develop
  dt: 0.01           # Small for reaction term accuracy
  save_interval: 2.0 # Save every 2 time units

output:
  base_dir: "data/datasets"

initial_conditions:
  # Test 1: Hexagonal spots (k2 just above threshold)
  - name: "br_hex_001"
    type: "perturbed_uniform"
    k1: 4.5
    k2: 6.75          # Just above threshold → hexagonal spots
    perturbation_amplitude: 0.05
    seed: 42

  # Test 2: Labyrinthine stripes (k2 farther from threshold)
  - name: "br_labyrinth_001"
    type: "perturbed_uniform"
    k1: 4.5
    k2: 7.5           # Farther from threshold → stripes
    perturbation_amplitude: 0.05
    seed: 43

  # Test 3: Smooth random IC (intermediate k2)
  - name: "br_smooth_001"
    type: "random_smooth"
    k1: 4.5
    k2: 7.2
    perturbation_amplitude: 0.05
    smoothing_scale: 3.0
    seed: 44

  # Test 4: Localized perturbation (tests pattern spreading)
  - name: "br_local_001"
    type: "localized_perturbation"
    k1: 4.5
    k2: 7.0
    perturbation_amplitude: 0.10
    patch_center: [25.0, 25.0]
    patch_radius: 8.0
    seed: 45
