# Nonlinear Heat Equation Test Configuration v1
# 27 tasks: 7 gb + 7 mb + 7 rp + 6 ss

simulation:
  name: "nl_heat_test-1"
  K: 1.0
  domain_size: [6.283185307179586, 6.283185307179586]
  resolution: [512, 512]
  t_end: 5.0
  dt: 0.005
  save_interval: 0.1

output:
  base_dir: "data/datasets"

initial_conditions:
  # NOTE: amplitude must stay < 1.0 for nl_heat
  # ========== gaussian_bump (gb) — 7 tasks ==========
  - {name: "nlh_gb_t01", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.25, amplitude: 0.8, seed: 6210001}
  - {name: "nlh_gb_t02", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.45, amplitude: 0.7, seed: 6210002}
  - {name: "nlh_gb_t03", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.6, amplitude: 0.75, seed: 6210003}
  - {name: "nlh_gb_t04", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.35, amplitude: 0.8, seed: 6210004}
  - {name: "nlh_gb_t05", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.7, amplitude: 0.65, seed: 6210005}
  - {name: "nlh_gb_t06", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.4, amplitude: 0.7, seed: 6210006}
  - {name: "nlh_gb_t07", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.5, amplitude: 0.5, seed: 6210007}

  # ========== multi_bump (mb) — 7 tasks ==========
  - {name: "nlh_mb_t01", type: "multi_bump", K: [0.1, 2.0], n_bumps: 3, sigma_range: [0.2, 0.5], seed: 6220001}
  - {name: "nlh_mb_t02", type: "multi_bump", K: [0.1, 2.0], n_bumps: 5, sigma_range: [0.3, 0.7], seed: 6220002}
  - {name: "nlh_mb_t03", type: "multi_bump", K: [0.1, 2.0], n_bumps: 2, sigma_range: [0.2, 0.8], seed: 6220003}
  - {name: "nlh_mb_t04", type: "multi_bump", K: [0.1, 2.0], n_bumps: 4, sigma_range: [0.15, 0.5], seed: 6220004}
  - {name: "nlh_mb_t05", type: "multi_bump", K: [0.1, 2.0], n_bumps: 6, sigma_range: [0.2, 0.6], seed: 6220005}
  - {name: "nlh_mb_t06", type: "multi_bump", K: [0.1, 2.0], n_bumps: 3, sigma_range: [0.3, 0.6], seed: 6220006}
  - {name: "nlh_mb_t07", type: "multi_bump", K: [0.1, 2.0], n_bumps: 8, sigma_range: [0.1, 0.4], seed: 6220007}

  # ========== random_perturbation (rp) — 7 tasks ==========
  - {name: "nlh_rp_t01", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.25, n_modes: 8, seed: 6230001}
  - {name: "nlh_rp_t02", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.15, n_modes: 15, seed: 6230002}
  - {name: "nlh_rp_t03", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.3, n_modes: 6, seed: 6230003}
  - {name: "nlh_rp_t04", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.2, n_modes: 12, seed: 6230004}
  - {name: "nlh_rp_t05", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.2, n_modes: 10, seed: 6230005}
  - {name: "nlh_rp_t06", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.12, n_modes: 18, seed: 6230006}
  - {name: "nlh_rp_t07", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.25, n_modes: 7, seed: 6230007}

  # ========== sine_superposition (ss) — 6 tasks ==========
  - {name: "nlh_ss_t01", type: "sine_superposition", K: [0.1, 2.0], modes: 2, seed: 6240001}
  - {name: "nlh_ss_t02", type: "sine_superposition", K: [0.1, 2.0], modes: 3, seed: 6240002}
  - {name: "nlh_ss_t03", type: "sine_superposition", K: [0.1, 2.0], modes: 4, seed: 6240003}
  - {name: "nlh_ss_t04", type: "sine_superposition", K: [0.1, 2.0], modes: 4, seed: 6240004}
  - {name: "nlh_ss_t05", type: "sine_superposition", K: [0.1, 2.0], modes: 4, seed: 6240005}
  - {name: "nlh_ss_t06", type: "sine_superposition", K: [0.1, 2.0], modes: 3, seed: 6240006}
