  - {name: "lot_rp_004", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 243004}
  - {name: "lot_rp_005", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 243005}
  - {name: "lot_rp_006", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 243006}

  # ========== multi_arm_spiral (mas) — 3 tasks (OOD) ==========
  - {name: "lot_mas_001", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 2, k: 0.5, r_core: 2.0, seed: 244001}
  - {name: "lot_mas_002", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 3, k: 0.5, r_core: 2.0, seed: 244002}
  - {name: "lot_mas_003", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 2, k: 0.3, r_core: 2.0, seed: 244003}

  # ========== plane_wave (pw) — 3 tasks (OOD) ==========
  - {name: "lot_pw_001", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.3, seed: 245001}
