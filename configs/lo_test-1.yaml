# Lambda-Omega Test Configuration v1
# 27 tasks: 4 ss + 4 tp + 4 mp + 5 rp (OOD) + 5 mas (OOD) + 5 pw (OOD)
# Same parameter ranges as train/val, plus OOD IC types

simulation:
  name: "lo_test-1"

  D_u: 1.0
  D_v: 1.0
  a: 1.0
  c: 2.0

  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  t_end: 50.0
  dt: 0.005
  save_interval: 1.0

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== single_spiral (ss) — 4 tasks ==========
  - {name: "lot_ss_001", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.5, r_core: 2.0, seed: 4210001}
  - {name: "lot_ss_002", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.5, r_core: 2.0, seed: 4210002}
  - {name: "lot_ss_003", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.3, r_core: 2.0, seed: 4210003}
  - {name: "lot_ss_004", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.7, r_core: 2.0, seed: 4210004}

  # ========== target_pattern (tp) — 4 tasks ==========
  - {name: "lot_tp_001", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, seed: 4220001}
  - {name: "lot_tp_002", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.5, seed: 4220002}
  - {name: "lot_tp_003", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.5, seed: 4220003}
  - {name: "lot_tp_004", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, seed: 4220004}

  # ========== multi_pacemaker (mp) — 4 tasks ==========
  - {name: "lot_mp_001", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 3, seed: 4230001}
  - {name: "lot_mp_002", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 4, seed: 4230002}
  - {name: "lot_mp_003", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 5, seed: 4230003}
  - {name: "lot_mp_004", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 3, seed: 4230004}

  # ========== random_perturbation (rp) — 5 tasks (OOD) ==========
  - {name: "lot_rp_001", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 4310001}
  - {name: "lot_rp_002", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 4310002}
  - {name: "lot_rp_003", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 4310003}
  - {name: "lot_rp_004", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 4310004}
  - {name: "lot_rp_005", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.1, seed: 4310005}

  # ========== multi_arm_spiral (mas) — 5 tasks (OOD) ==========
  - {name: "lot_mas_001", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 2, k: 0.5, r_core: 2.0, seed: 4320001}
  - {name: "lot_mas_002", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 3, k: 0.5, r_core: 2.0, seed: 4320002}
  - {name: "lot_mas_003", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 2, k: 0.3, r_core: 2.0, seed: 4320003}
  - {name: "lot_mas_004", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 3, k: 0.3, r_core: 2.0, seed: 4320004}
  - {name: "lot_mas_005", type: "multi_arm_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], m: 2, k: 0.7, r_core: 2.0, seed: 4320005}

  # ========== plane_wave (pw) — 5 tasks (OOD) ==========
  - {name: "lot_pw_001", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.3, seed: 4330001}
  - {name: "lot_pw_002", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.5, seed: 4330002}
  - {name: "lot_pw_003", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.7, seed: 4330003}
  - {name: "lot_pw_004", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.3, seed: 4330004}
  - {name: "lot_pw_005", type: "plane_wave", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], q: 0.5, seed: 4330005}
