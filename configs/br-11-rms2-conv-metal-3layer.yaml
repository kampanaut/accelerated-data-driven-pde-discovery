# Brusselator MAML experiment: RMS² + combinatorial conv + MeTAL, 3-layer MLP
# Combines conv feature expansion with task-adaptive loss.

experiment:
  name: "br-11-rms2-conv-metal-3layer"
  pde_type: br
  seed: 42
  device: "cuda"

data:
  meta_train_dir: "data/datasets/br_train-2"
  meta_val_dir: "data/datasets/br_val-2"
  meta_test_dir: "data/datasets/br_test-2"

training:
  inner_lr: 0.0001
  outer_lr: 0.001
  inner_steps: 14
  meta_batch_size: 4
  k_shot: 800
  query_size: 1600
  max_iterations: 5000
  patience: 300
  log_interval: 1
  hidden_dims: [100, 100, 100]
  activation: "silu"
  conv_filters: 32
  conv_kernel_size: 3
  use_metal: true
  T_0: 200
  T_mult: 2
  first_order: false
  # LR scheduler
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: "warm_restarts"
  min_lr: 0.000001

evaluation:
  k_values: [10, 20, 50, 100, 500, 1000]
  noise_levels: [0.0, 0.01, 0.05, 0.10]
  fine_tune_lr: 0.0001
  max_steps: 1000
  deriv_threshold: 0.0005
  fixed_steps: [50, 100, 150, 200, 250, 300, 350, 400, 450, 500]
  holdout_size: 5000

visualization:
  dpi: 300
  generate_per_task: true
  generate_aggregated: true
