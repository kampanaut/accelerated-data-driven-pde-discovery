experiment:
  name: heat-25-5step-k800-baseline
  pde_type: heat
  seed: 42
  device: cuda
output:
  base_dir: data/models/zeroed/heat
data:
  meta_train_dir: data/datasets/heat_train-1
  meta_val_dir: data/datasets/heat_val-1
  meta_test_dir: data/datasets/heat_test-1
training:
  inner_lr: 0.0001
  outer_lr: 0.001
  inner_steps: 5
  meta_batch_size: 8
  k_shot: 800
  query_size: 1600
  max_iterations: 500
  patience: 300
  log_interval: 1
  hidden_dims:
  - 100
  - 100
  activation: silu
  input_dim: 5
  output_dim: 1
  first_order: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: warm_restarts
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-06
  max_grad_norm: 100.0
  zero_non_rhs_features: true
evaluation:
  k_values:
  - 800
  noise_levels:
  - 0.0
  - 0.01
  - 0.05
  - 0.1
  fine_tune_lr: 1.0e-05
  max_steps: 50
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 5
  - 10
  - 25
  - 50
  holdout_size: 5000
  log_weights: false
visualization:
  dpi: 300
  only: scatter[0,1,1000],best-combo
  compare_experiments:
  - heat-17-1step-k800-baseline
  - heat-18-1step-k10-baseline
  - heat-25-5step-k800-baseline
  - heat-26-5step-k10-baseline
