# Brusselator Training Configuration
# 60 tasks: 5 IC types × 12 seeds (unique seed per task)
#
# NEW DESIGN: Tasks defined by IC (type + seed), parameters sampled randomly
# - k2: sampled from [6.8, 7.6] (spans spots→stripes regimes)
# - D_u: sampled from [1.5, 2.5] (±25% variation around standard 2.0)
# - D_v: fixed at 16.0 (keep diffusion ratio stable)
#
# Turing threshold varies with D_u: k2_c = (1 + k1 * sqrt(D_u/D_v))^2
# For D_u ∈ [1.5, 2.5], k2_c ∈ [6.43, 6.90], so k2 ∈ [6.8, 7.6] is always above threshold

simulation:
  name: "br_train-1"

  # Default parameters (may be overridden per-task)
  D_u: 2.0
  D_v: 16.0
  k1: 4.5
  k2: 7.0

  # Domain
  domain_size: [50.0, 50.0]
  resolution: [128, 128]

  # Time integration
  t_end: 7.0
  dt: 0.001
  save_interval: 0.2

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 5 types × 12 seeds = 60 tasks
# Each task samples k2 and D_u randomly from ranges (seeded for reproducibility)
# ============================================================================
initial_conditions:
