  - {name: "fhnt_bw_006", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 330006}

  # ========== random_perturbation (rp) — 6 tasks (OOD) ==========
  - {name: "fhnt_rp_001", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 340001}
  - {name: "fhnt_rp_002", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 340002}
  - {name: "fhnt_rp_003", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 340003}
  - {name: "fhnt_rp_004", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 340004}
