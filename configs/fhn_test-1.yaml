# FitzHugh-Nagumo Test Configuration v1
# 27 tasks: 5 lb + 5 mb + 5 pf + 6 bw (OOD) + 6 rp (OOD)
# Same parameter ranges as train/val, plus OOD IC types

simulation:
  name: "fhn_test-1"

  D_u: 1.0
  D_v: 0.1
  eps: 0.2
  a: 0.7
  b: 0.0

  domain_size: [20.0, 20.0]
  resolution: [512, 512]

  t_end: 20.0
  dt: 0.005
  save_interval: 0.4

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== localized_bump (lb) — 5 tasks ==========
  - {name: "fhnt_lb_001", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3210001}
  - {name: "fhnt_lb_002", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3210002}
  - {name: "fhnt_lb_003", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3210003}
  - {name: "fhnt_lb_004", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3210004}
  - {name: "fhnt_lb_005", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3210005}

  # ========== multi_bump (mb) — 5 tasks ==========
  - {name: "fhnt_mb_001", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 3, seed: 3220001}
  - {name: "fhnt_mb_002", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 4, seed: 3220002}
  - {name: "fhnt_mb_003", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 5, seed: 3220003}
  - {name: "fhnt_mb_004", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 3, seed: 3220004}
  - {name: "fhnt_mb_005", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 4, seed: 3220005}

  # ========== perturbed_front (pf) — 5 tasks ==========
  - {name: "fhnt_pf_001", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.05, width: 0.5, seed: 3230001}
  - {name: "fhnt_pf_002", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.05, width: 1.0, seed: 3230002}
  - {name: "fhnt_pf_003", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.10, width: 0.5, seed: 3230003}
  - {name: "fhnt_pf_004", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.10, width: 1.0, seed: 3230004}
  - {name: "fhnt_pf_005", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.05, width: 0.5, seed: 3230005}

  # ========== broken_wavefront (bw) — 6 tasks (OOD) ==========
  - {name: "fhnt_bw_001", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 3310001}
  - {name: "fhnt_bw_002", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 3310002}
  - {name: "fhnt_bw_003", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 3310003}
  - {name: "fhnt_bw_004", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 3310004}
  - {name: "fhnt_bw_005", type: "broken_wavefront", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], seed: 3310005}
