  - {name: "fhnt_rp_003", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 3320003}
  - {name: "fhnt_rp_004", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 3320004}
  - {name: "fhnt_rp_005", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 3320005}
  - {name: "fhnt_rp_006", type: "random_perturbation", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], perturbation_amplitude: 0.1, seed: 3320006}
