# Configuration for Gaussian vortex position sweep
# Generates 3 datasets with vortices at different positions

simulation:
  nu: 0.01
  domain_size: [6.283185307179586, 6.283185307179586]  # 2π × 2π
  resolution: [32, 64]
  t_end: 10.0
  dt: 0.01
  save_interval: 0.2

output_dir: "gaussian_sweep"

initial_conditions:
  - name: "vortex_center"
    type: "gaussian_vortex"
    center: [3.141592653589793, 3.141592653589793]  # π, π
    width: 0.5
    strength: 1.0

  - name: "vortex_left"
    type: "gaussian_vortex"
    center: [1.5707963267948966, 3.141592653589793]  # π/2, π
    width: 0.5
    strength: 1.5

  - name: "vortex_bottom"
    type: "gaussian_vortex"
    center: [3.141592653589793, 1.5707963267948966]  # π, π/2
    width: 0.5
    strength: 0.8
