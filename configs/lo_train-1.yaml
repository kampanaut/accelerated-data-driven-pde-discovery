# Lambda-Omega Training Configuration v1
# 42 tasks: 14 ss + 14 tp + 14 mp
# Oscillatory regime: a=1.0 fixed, D_u/D_v/c sampled per-task
# Domain 50x50, 128x128, dt=0.01

simulation:
  name: "lo_train-1"

  # Default parameters (overridden per-task via ranges)
  D_u: 1.0
  D_v: 1.0
  a: 1.0
  c: 2.0

  # Domain — 50x50 captures spiral arm spacing at these diffusion values
  domain_size: [50.0, 50.0]
  resolution: [128, 128]

  # Time integration
  t_end: 50.0
  dt: 0.01
  save_interval: 0.5

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 14 ss + 14 tp + 14 mp = 42 tasks
# ============================================================================
initial_conditions:
  # ========== single_spiral (ss) — 14 tasks ==========
