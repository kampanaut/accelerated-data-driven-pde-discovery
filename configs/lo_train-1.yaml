# Lambda-Omega Training Configuration v1
# 28 tasks: 10 ss + 9 tp + 9 mp
# Oscillatory regime: a=1.0 fixed, D_u/D_v/c sampled per-task
# Domain 50x50, 512x512, dt=0.005

simulation:
  name: "lo_train-1"

  # Default parameters (overridden per-task via ranges)
  D_u: 1.0
  D_v: 1.0
  a: 1.0
  c: 2.0

  # Domain — 50x50 captures spiral arm spacing at these diffusion values
  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  # Time integration
  t_end: 50.0
  dt: 0.005
  save_interval: 1.0

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 10 ss + 9 tp + 9 mp = 28 tasks
# ============================================================================
initial_conditions:
  # ========== single_spiral (ss) — 10 tasks ==========
  - {name: "lo_ss_001", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.5, r_core: 2.0, seed: 4010001}
  - {name: "lo_ss_002", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.5, r_core: 2.0, seed: 4010002}
  - {name: "lo_ss_003", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.3, r_core: 2.0, seed: 4010003}
  - {name: "lo_ss_004", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.3, r_core: 2.0, seed: 4010004}
