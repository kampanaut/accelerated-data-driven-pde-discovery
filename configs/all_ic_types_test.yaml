# Comprehensive test of all IC types
# Tests all 9 IC generators in one run

simulation:
  nu: 0.01
  domain_size: [6.283185307179586, 6.283185307179586]  # 2π × 2π
  resolution: [32, 64]
  t_end: 5.0  # Shorter for quick test
  dt: 0.01
  save_interval: 0.5

output_dir: "all_ic_types_test"

initial_conditions:
  # 1. Single Gaussian Vortex
  - name: "01_gaussian"
    type: "gaussian_vortex"
    center: [3.14, 3.14]
    width: 0.5
    strength: 1.0

  # 2. Multiple Vortices
  - name: "02_multi_vortex"
    type: "multi_vortex"
    vortices:
      - center: [2.0, 2.0]
        width: 0.4
        strength: 1.0
      - center: [4.0, 4.0]
        width: 0.4
        strength: -1.0

  # 3. Taylor-Green Vortex
  - name: "03_taylor_green"
    type: "taylor_green"
    amplitude: 1.0

  # 4. Lamb-Oseen Vortex
  - name: "04_lamb_oseen"
    type: "lamb_oseen"
    center: [3.14, 3.14]
    core_radius: 0.6
    circulation: 2.0

  # 5. Dipole (Vortex Pair)
  - name: "05_dipole"
    type: "dipole"
    center: [3.14, 3.14]
    separation: 1.5
    width: 0.4
    strength: 1.0

  # 6. Shear Layer
  - name: "06_shear_layer"
    type: "shear_layer"
    y_center: 3.14
    thickness: 0.3
    velocity_jump: 2.0
    perturbation_amplitude: 0.1

  # 7. Von Kármán Street
  - name: "07_von_karman"
    type: "von_karman"
    n_vortices: 6
    spacing: 1.5
    offset: 2.0
    width: 0.4
    strength: 1.0

  # 8. Random Vortex Soup
  - name: "08_random_soup"
    type: "random_soup"
    n_vortices: 8
    strength_range: [-1.0, 1.0]
    width_range: [0.3, 0.5]
    seed: 42

  # 9. Perturbed Uniform Flow
  - name: "09_perturbed_flow"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.1
    perturbation_wavelength: 2.0
