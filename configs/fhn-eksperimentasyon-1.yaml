# FitzHugh-Nagumo MAML experiment v1
# Excitable regime, D_u/D_v/a varying per-task
# Split: 42 train / 14 val / 30 test

experiment:
  name: "fhn-maml-1"
  pde_type: fhn
  seed: 42
  device: "cuda"

data:
  meta_train_dir: "data/datasets/fhn_train-1"
  meta_val_dir: "data/datasets/fhn_val-1"
  meta_test_dir: "data/datasets/fhn_test-1"

training:
  inner_lr: 0.0001
  outer_lr: 0.00001
  inner_steps: 8
  meta_batch_size: 20
  k_shot: 500
  query_size: 1000
  max_iterations: 5000
  patience: 300
  log_interval: 1
  hidden_dims: [100, 100]
  activation: "silu"
  T_0: 500
  T_mult: 2
  first_order: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: "warm_restarts"
  min_lr: 0.000001

evaluation:
  k_values: [10, 50, 100, 500, 1000]
  noise_levels: [0.0, 0.01, 0.05, 0.10]
  fine_tune_lr: 0.001
  max_steps: 1000
  deriv_threshold: 0.0005
  fixed_steps: [50, 100, 150, 200, 250, 300, 350, 400, 450, 500]
  holdout_size: 1500

visualization:
  dpi: 300
  generate_per_task: true
  generate_aggregated: true
