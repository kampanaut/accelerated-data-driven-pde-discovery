# FitzHugh-Nagumo Training Configuration v1
# 28 tasks: 10 lb + 9 mb + 9 pf
# Excitable regime: eps=0.2, b=0
# D_u, D_v, a sampled per-task from ranges

simulation:
  name: "fhn_train-1"

  # Default parameters (overridden per-task via ranges)
  D_u: 1.0
  D_v: 0.1
  eps: 0.2
  a: 0.7
  b: 0.0

  # Domain — 20x20 captures spiral arm width (~2-5 units)
  domain_size: [20.0, 20.0]
  resolution: [512, 512]

  # Time integration
  t_end: 20.0
  dt: 0.005
  save_interval: 0.4

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 10 lb + 9 mb + 9 pf = 28 tasks
# ============================================================================
initial_conditions:
  # ========== localized_bump (lb) — 10 tasks ==========
  - {name: "fhn_lb_001", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3010001}
  - {name: "fhn_lb_002", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3010002}
