# Lambda-Omega Validation Configuration v1
# 5 tasks: 1 ss + 2 tp + 2 mp
# Same parameter ranges as lo_train-1

simulation:
  name: "lo_val-1"

  D_u: 1.0
  D_v: 1.0
  a: 1.0
  c: 2.0

  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  t_end: 50.0
  dt: 0.005
  save_interval: 1.0

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== single_spiral (ss) — 1 task ==========
  - {name: "lov_ss_001", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.5, r_core: 2.0, seed: 4110001}

  # ========== target_pattern (tp) — 2 tasks ==========
  - {name: "lov_tp_001", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, seed: 4120001}
  - {name: "lov_tp_002", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.5, seed: 4120002}

  # ========== multi_pacemaker (mp) — 2 tasks ==========
  - {name: "lov_mp_001", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 3, seed: 4130001}
  - {name: "lov_mp_002", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 4, seed: 4130002}
