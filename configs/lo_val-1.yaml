# Lambda-Omega Validation Configuration v1
# 14 tasks: 5 ss + 5 tp + 4 mp
# Same parameter ranges as lo_train-1

simulation:
  name: "lo_val-1"

  D_u: 1.0
  D_v: 1.0
  a: 1.0
  c: 2.0

  domain_size: [50.0, 50.0]
  resolution: [128, 128]

  t_end: 50.0
  dt: 0.01
  save_interval: 0.5

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== single_spiral (ss) — 5 tasks ==========
  - {name: "lov_ss_001", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.5, r_core: 2.0, seed: 230001}
  - {name: "lov_ss_002", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.5, r_core: 2.0, seed: 230002}
  - {name: "lov_ss_003", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.3, r_core: 2.0, seed: 230003}
  - {name: "lov_ss_004", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: -1, k: 0.7, r_core: 2.0, seed: 230004}
  - {name: "lov_ss_005", type: "single_spiral", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], chirality: 1, k: 0.6, r_core: 2.5, seed: 230005}

  # ========== target_pattern (tp) — 5 tasks ==========
  - {name: "lov_tp_001", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, seed: 231001}
  - {name: "lov_tp_002", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.5, seed: 231002}
  - {name: "lov_tp_003", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.5, seed: 231003}
  - {name: "lov_tp_004", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, seed: 231004}
  - {name: "lov_tp_005", type: "target_pattern", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 0.5, seed: 231005}

  # ========== multi_pacemaker (mp) — 4 tasks ==========
  - {name: "lov_mp_001", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 3, seed: 232001}
  - {name: "lov_mp_002", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 4, seed: 232002}
  - {name: "lov_mp_003", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 5, seed: 232003}
  - {name: "lov_mp_004", type: "multi_pacemaker", D_u: [0.5, 2.0], D_v: [0.5, 2.0], c: [1.0, 3.0], amp: 1.0, n_bumps: 3, seed: 232004}
