# Heat Equation MAML: RMS³ + 1 inner step, 2-layer MLP, MeTAL, low k
# Compare against heat-2 (rms3, no MeTAL, k=10)
# Control: pure diffusion, no reaction terms to absorb into

experiment:
  name: "heat-4-rms3-1step-2layer-metal-lowkshot"
  pde_type: "heat"
  seed: 42
  device: "cuda"

data:
  meta_train_dir: "data/datasets/heat_train-1"
  meta_val_dir: "data/datasets/heat_val-1"
  meta_test_dir: "data/datasets/heat_test-1"

training:
  inner_lr: 0.0001
  outer_lr: 0.001
  inner_steps: 1
  meta_batch_size: 4
  k_shot: 10
  query_size: 2000
  max_iterations: 5000
  patience: 300
  log_interval: 1
  hidden_dims: [100, 100]
  activation: "silu"
  input_dim: 5
  output_dim: 1
  T_0: 200
  T_mult: 2
  first_order: false
  metal:
    enabled: true
    hidden_dim: 64
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: "warm_restarts"
  min_lr: 0.000001

evaluation:
  k_values: [800, 1000, 1600, 3000, 5000]
  noise_levels: [0.0, 0.01, 0.05, 0.10]
  fine_tune_lr: 0.00001
  max_steps: 1000
  deriv_threshold: 0.0005
  fixed_steps: [1, 5, 10, 14, 15, 20, 25, 50, 100, 200, 300, 500, 800, 1000]
  holdout_size: 5000

visualization:
  dpi: 300
  generate_per_task: true
  generate_aggregated: true
