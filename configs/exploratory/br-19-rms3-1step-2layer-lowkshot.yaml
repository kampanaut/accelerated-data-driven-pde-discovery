# Brusselator MAML experiment: RMS³ + 1 inner step, 2-layer MLP, low k
# Same as br-17 but with normalized MSE inner loop (rms3 = rel MSE inner + outer)
# Compare against br-17 (rms2 = raw MSE inner + rel MSE outer)

experiment:
  name: "br-19-rms3-1step-2layer-lowkshot"
  pde_type: br
  seed: 42
  device: "cuda"

data:
  meta_train_dir: "data/datasets/br_train-2"
  meta_val_dir: "data/datasets/br_val-2"
  meta_test_dir: "data/datasets/br_test-2"

training:
  inner_lr: 0.0001
  outer_lr: 0.001
  inner_steps: 1
  meta_batch_size: 4
  k_shot: 10
  query_size: 2000
  max_iterations: 5000
  patience: 300
  log_interval: 1
  hidden_dims: [100, 100]
  activation: "silu"
  T_0: 200
  T_mult: 2
  first_order: false
  # LR scheduler
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: "warm_restarts"
  min_lr: 0.000001

evaluation:
  k_values: [800, 1000, 1600, 3000, 5000]
  noise_levels: [0.0, 0.01, 0.05, 0.10]
  fine_tune_lr: 0.00001
  max_steps: 1000
  deriv_threshold: 0.0005
  fixed_steps: [1, 5, 10, 14, 15, 20, 25, 50, 100, 200, 300, 500, 800, 1000]
  holdout_size: 5000

visualization:
  dpi: 300
  generate_per_task: true
  generate_aggregated: true
