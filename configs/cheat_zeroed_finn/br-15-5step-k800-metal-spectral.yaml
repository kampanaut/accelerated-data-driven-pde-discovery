experiment:
  name: br-15-5step-k800-metal-spectral
  pde_type: br
  seed: 42
  device: cuda
output:
  base_dir: data/models/cheat_zeroed_finn/br
data:
  meta_train_dir: data/datasets/br_train-2
  meta_val_dir: data/datasets/br_val-2
  meta_test_dir: data/datasets/br_test-2
training:
  inner_lr: 0.01
  outer_lr: 0.001
  inner_steps: 5
  meta_batch_size: 8
  k_shot: 800
  query_size: 1600
  max_iterations: 500
  patience: 300
  log_interval: 1
  layers:
  - input: 10
  - output: 2
    bias: false
  first_order: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: warm_restarts
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-06
  max_grad_norm: 100.0
  zero_non_rhs_features: true
  spectral_loss:
    enabled: true
  metal:
    enabled: true
    hidden_dim: 64
evaluation:
  k_values:
  - 800
  - 1000
  - 1600
  - 3000
  - 5000
  noise_levels:
  - 0.0
  - 0.01
  - 0.05
  - 0.1
  fine_tune_lr: 0.01
  max_steps: 50
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 1
  - 5
  - 10
  - 25
  - 50
  holdout_size: 5000
  log_weights: true
visualization:
  dpi: 300
  only: scatter[0,1,1000],best-combo
  compare_experiments:
  - br-7-1step-k800-metal-spectral
  - br-8-1step-k10-metal-spectral
  - br-15-5step-k800-metal-spectral
  - br-16-5step-k10-metal-spectral
