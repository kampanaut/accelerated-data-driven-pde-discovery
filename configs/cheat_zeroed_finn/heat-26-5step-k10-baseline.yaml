experiment:
  name: heat-26-5step-k10-baseline
  pde_type: heat
  seed: 42
  device: cuda
output:
  base_dir: data/models/cheat_zeroed_finn/heat
data:
  meta_train_dir: data/datasets/heat_train-1
  meta_val_dir: data/datasets/heat_val-1
  meta_test_dir: data/datasets/heat_test-1
training:
  inner_lr: 0.01
  outer_lr: 0.001
  adam_betas:
  - 0.9
  - 0.99
  inner_steps: 5
  meta_batch_size: 8
  k_shot: 10
  query_size: 2000
  max_iterations: 500
  patience: 300
  checkpoint_interval: 0
  log_interval: 1
  layers:
  - input: 5
  - output: 1
    bias: false
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 1650
  lslr_enabled: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: warm_restarts
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-06
  loss_function: normalized_mse
  max_grad_norm: 100.0
  zero_non_rhs_features: true
evaluation:
  k_values:
  - 10
  noise_levels:
  - 0.0
  - 0.01
  - 0.05
  - 0.1
  fine_tune_lr: 0.01
  max_steps: 50
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 5
  - 50
  holdout_size: 5000
  log_weights: true
visualization:
  dpi: 300
  only: scatter[0,5,50],best-combo
  compare_experiments:
  - heat-25-5step-k800-baseline
  - heat-26-5step-k10-baseline
