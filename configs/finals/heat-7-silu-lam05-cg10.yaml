experiment:
  name: heat-7-silu-lam05-cg10
  pde_type: heat
  seed: 42
  device: cuda
output:
  base_dir: data/models/finals
data:
  meta_train_dir: data/datasets/heat_train-1
  meta_val_dir: data/datasets/heat_val-1
  meta_test_dir: data/datasets/heat_test-1
training:
  inner_lr: 0.01
  outer_lr: 0.01
  adam_betas:
  - 0.9
  - 0.999
  inner_steps: 16
  meta_batch_size: 25
  k_shot: 1000
  query_size: 10000
  max_iterations: 1000
  patience: 0
  checkpoint_interval: 100
  log_interval: 20
  hidden_dims:
  - 100
  - 100
  activation: silu
  input_dim: 5
  output_dim: 1
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 5000
  lslr_enabled: false
  warmup_iterations: 0
  use_scheduler: false
  scheduler_type: cosine
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-05
  loss_function: normalized_mse
  max_grad_norm: 0.0
  zero_non_rhs_features: true
  imaml:
    enabled: true
    lam: 0.5
    lam_lr: 0.0
    lam_min: 0.0
    cg_steps: 10
    cg_damping: 1.0
    inner_optimizer: lbfgs
    proximal_every_step: false
evaluation:
  k_values:
  - 1000
  noise_levels:
  - 0.0
  fine_tune_lr: 0.01
  max_steps: 16
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 16
  holdout_size: 50000
  log_weights: false
visualization:
  dpi: 300
  only: scatter[0,1,2,3,4,16,16],jacobian[0,16,16],generalization,best-combo
  compare_experiments:
  - heat-7-silu-lam05-cg10
  exclude_suffixes_append: []
  exclude_max_iteration: 20
