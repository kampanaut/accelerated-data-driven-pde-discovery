simulation:
  name: "ns_val-1"                  # Output: {base_dir}/{name}/
  nu: [0.01, 0.025]                            # Viscosity (or [min, max] to sample)
  domain_size: [6.283185, 6.283185]   # 2pi x 2pi
  resolution: [512, 512]                # ny x nx grid
  t_end: 7.0                         # Simulation end time
  dt: 0.005                            # Timestep
  save_interval: 0.14                  # Snapshot frequency

initial_conditions:
  # ==========================================================================
  # gv (gaussian_vortex) - 1 task, seed 61
  # ==========================================================================
  - name: "gv_n5_s61_061"
    type: "gaussian_vortex"
    n_gaussians: 5
    amplitude_range: [-2.0, 2.0]
    width_range: [0.2, 1.5]
    seed: 1110001

  # ==========================================================================
  # gd (gaussian_direct) - 1 task, seed 66
  # ==========================================================================
  - name: "gd_n6_s66_066"
    type: "gaussian_direct"
    n_gaussians_u: 3
    n_gaussians_v: 3
    amplitude_range: [-2.0, 2.0]
    width_range: [0.3, 1.2]
    seed: 1120001

  # ==========================================================================
  # gh (gaussian_hybrid) - 1 task, seed 71
  # ==========================================================================
  - name: "gh_n5_s71_071"
    type: "gaussian_hybrid"
    n_gaussians_vorticity: 5
    n_gaussians_u: 3
    n_gaussians_v: 3
    amplitude_range: [-1.5, 1.5]
    width_range: [0.3, 1.2]
    alpha: 0.7
    beta: 0.3
    seed: 1130001

  # ==========================================================================
  # rs (random_soup) - 1 task, seed 77
  # ==========================================================================
  - name: "rs_n8_s77_077"
    type: "random_soup"
    n_vortices: 8
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 1140001

  # ==========================================================================
  # pf (perturbed_flow) - 1 task, seed 82
  # ==========================================================================
  - name: "pf_w1.0_s82_082"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.15
    perturbation_wavelength: 1.0
    seed: 1150001
