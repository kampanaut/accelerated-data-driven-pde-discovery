# Brusselator Training Configuration v2
# 28 tasks: 10 pu + 9 gp + 9 rs
# Early-transient regime (t_end=2.0), wider parameter ranges, k2_delta mode
#
# k2_delta: k2 = k2_c + delta, where k2_c is the Turing threshold
# This ensures all tasks are above threshold regardless of D_u draw

simulation:
  name: "br_train-2"

  # Default parameters (overridden per-task via ranges)
  D_u: 2.0
  D_v: 16.0
  k1: 4.5
  k2: 7.0

  # Domain
  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  # Time integration — early transient
  t_end: 2.0
  dt: 0.005
  save_interval: 0.04

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 10 pu + 9 gp + 9 rs = 28 tasks
# ============================================================================
initial_conditions:
  # ========== perturbed_uniform (pu) — 10 tasks ==========
  - {name: "br2_pu_001", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010001}
  - {name: "br2_pu_002", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010002}
  - {name: "br2_pu_003", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010003}
  - {name: "br2_pu_004", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010004}
