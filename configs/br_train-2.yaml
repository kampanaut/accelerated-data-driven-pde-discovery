  - {name: "br2_pu_008", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010008}
  - {name: "br2_pu_009", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010009}
  - {name: "br2_pu_010", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2010010}

  # ========== gradient_perturbation (gp) — 9 tasks ==========
  - {name: "br2_gp_001", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 2, seed: 2020001}
