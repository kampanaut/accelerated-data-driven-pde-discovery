# Brusselator Training Configuration v2
# 42 tasks: 24 pu + 12 gp + 6 rs
# Early-transient regime (t_end=2.0), wider parameter ranges, k2_delta mode
#
# k2_delta: k2 = k2_c + delta, where k2_c is the Turing threshold
# This ensures all tasks are above threshold regardless of D_A draw

simulation:
  name: "br_train-2"

  # Default parameters (overridden per-task via ranges)
  D_A: 2.0
  D_B: 16.0
  k1: 4.5
  k2: 7.0

  # Domain
  domain_size: [50.0, 50.0]
  resolution: [128, 128]

  # Time integration — early transient
  t_end: 2.0
  dt: 0.001
  save_interval: 0.02

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 24 pu + 12 gp + 6 rs = 42 tasks
# ============================================================================
initial_conditions:
  # ========== perturbed_uniform (pu) — 24 tasks ==========
