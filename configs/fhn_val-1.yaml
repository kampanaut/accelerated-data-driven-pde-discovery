# FitzHugh-Nagumo Validation Configuration v1
# 5 tasks: 1 lb + 2 mb + 2 pf
# Same parameter ranges as fhn_train-1

simulation:
  name: "fhn_val-1"

  D_u: 1.0
  D_v: 0.1
  eps: 0.2
  a: 0.7
  b: 0.0

  domain_size: [20.0, 20.0]
  resolution: [512, 512]

  t_end: 20.0
  dt: 0.005
  save_interval: 0.4

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== localized_bump (lb) — 1 task ==========
  - {name: "fhnv_lb_001", type: "localized_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, seed: 3110001}

  # ========== multi_bump (mb) — 2 tasks ==========
  - {name: "fhnv_mb_001", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 3, seed: 3120001}
  - {name: "fhnv_mb_002", type: "multi_bump", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 1.0, n_bumps: 4, seed: 3120002}

  # ========== perturbed_front (pf) — 2 tasks ==========
  - {name: "fhnv_pf_001", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.05, width: 0.5, seed: 3130001}
  - {name: "fhnv_pf_002", type: "perturbed_front", D_u: [0.5, 2.0], D_v: [0.05, 0.2], a: [0.5, 1.5], amp: 0.05, width: 1.0, seed: 3130002}
