    n_gaussians_u: 5
    n_gaussians_v: 5
    amplitude_range: [-1.5, 1.5]
    width_range: [0.3, 1.2]
    alpha: 0.5
    beta: 0.5
    seed: 76

  # ==========================================================================
  # rs (random_soup) - 5 tasks, seeds 77-81, n_vortices 8-15
  # ==========================================================================
  - name: "rs_n8_s77_077"
    type: "random_soup"
    n_vortices: 8
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 77

  - name: "rs_n10_s78_078"
    type: "random_soup"
    n_vortices: 10
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 78

  - name: "rs_n12_s79_079"
    type: "random_soup"
    n_vortices: 12
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 79

  - name: "rs_n13_s80_080"
    type: "random_soup"
    n_vortices: 13
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 80

  - name: "rs_n15_s81_081"
    type: "random_soup"
    n_vortices: 15
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 81

  # ==========================================================================
  # pf (perturbed_flow) - 4 tasks, seeds 82-85, wavelength 1.0-3.0
  # ==========================================================================
  - name: "pf_w1.0_s82_082"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.15
    perturbation_wavelength: 1.0
    seed: 82

  - name: "pf_w1.5_s83_083"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
