    seed: 83

  - name: "pf_w2.0_s84_084"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.15
    perturbation_wavelength: 2.0
    seed: 84

  - name: "pf_w3.0_s85_085"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.15
    perturbation_wavelength: 3.0
    seed: 85
