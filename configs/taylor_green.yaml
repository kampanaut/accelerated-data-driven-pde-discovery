# Configuration for Taylor-Green vortex
# Classic test case with exact solution at t=0

simulation:
  nu: 0.01
  domain_size: [6.283185307179586, 6.283185307179586]  # 2π × 2π
  resolution: [32, 64]
  t_end: 10.0
  dt: 0.01
  save_interval: 0.2

output_dir: "taylor_green"

initial_conditions:
  - name: "taylor_green_standard"
    type: "taylor_green"
    amplitude: 1.0
