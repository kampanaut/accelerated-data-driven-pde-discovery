# Heat Equation Training Configuration v1
# 42 tasks: 11 gb + 11 mb + 10 rp + 10 ss
# u_t = D * nabla^2(u), D sampled per-task from [0.1, 2.0]
# Domain 2pi x 2pi, 128x128, dt=0.01

simulation:
  name: "heat_train-1"

  D: 1.0

  domain_size: [6.283185307179586, 6.283185307179586]  # 2*pi
  resolution: [128, 128]

  t_end: 5.0
  dt: 0.01
  save_interval: 0.1

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 11 gb + 11 mb + 10 rp + 10 ss = 42 tasks
# ============================================================================
initial_conditions:
  # ========== gaussian_bump (gb) — 11 tasks ==========
  - {name: "heat_gb_001", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.3, amplitude: 1.0, seed: 300001}
  - {name: "heat_gb_002", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.5, amplitude: 1.5, seed: 300002}
  - {name: "heat_gb_003", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.7, amplitude: 0.8, seed: 300003}
  - {name: "heat_gb_004", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.4, amplitude: 2.0, seed: 300004}
  - {name: "heat_gb_005", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.2, amplitude: 1.2, seed: 300005}
  - {name: "heat_gb_006", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.6, amplitude: 1.0, seed: 300006}
  - {name: "heat_gb_007", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.3, amplitude: 1.8, seed: 300007}
  - {name: "heat_gb_008", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.8, amplitude: 0.6, seed: 300008}
  - {name: "heat_gb_009", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.5, amplitude: 1.0, seed: 300009}
  - {name: "heat_gb_010", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.4, amplitude: 1.5, seed: 300010}
