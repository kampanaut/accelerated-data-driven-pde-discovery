  - {name: "br2t_lp_006", type: "localized_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, patch_center: [25.0, 25.0], patch_radius: 8.0, seed: 2310006}

  # ========== multi_patch_perturbation (mp) — 6 tasks (OOD) ==========
