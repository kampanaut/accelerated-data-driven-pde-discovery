  - {name: "br2t_rs_005", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2230005}

  # ========== localized_perturbation (lp) — 6 tasks (OOD) ==========
