  - {name: "br2t_mp_002", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 4, patch_radius: 5.0, seed: 2320002}
  - {name: "br2t_mp_003", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 5, patch_radius: 4.5, seed: 2320003}
  - {name: "br2t_mp_004", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 3, patch_radius: 6.0, seed: 2320004}
  - {name: "br2t_mp_005", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 4, patch_radius: 5.0, seed: 2320005}
