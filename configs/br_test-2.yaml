  - {name: "br2t_lp_004", type: "localized_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, patch_center: [25.0, 25.0], patch_radius: 8.0, seed: 830004}
  - {name: "br2t_lp_005", type: "localized_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, patch_center: [25.0, 25.0], patch_radius: 8.0, seed: 830005}
  - {name: "br2t_lp_006", type: "localized_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, patch_center: [25.0, 25.0], patch_radius: 8.0, seed: 830006}

  # ========== multi_patch_perturbation (mp) — 6 tasks (OOD) ==========
  - {name: "br2t_mp_001", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 3, patch_radius: 6.0, seed: 840001}
  - {name: "br2t_mp_002", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 4, patch_radius: 5.0, seed: 840002}
  - {name: "br2t_mp_003", type: "multi_patch_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.10, n_patches: 5, patch_radius: 4.5, seed: 840003}
