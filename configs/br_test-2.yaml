# Brusselator Test Configuration v2
# 27 tasks: 5 pu + 5 gp + 5 rs + 6 lp (OOD) + 6 mp (OOD)
# Same parameter ranges as train/val, plus OOD IC types

simulation:
  name: "br_test-2"

  D_u: 2.0
  D_v: 16.0
  k1: 4.5
  k2: 7.0

  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  t_end: 2.0
  dt: 0.005
  save_interval: 0.04

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== perturbed_uniform (pu) — 5 tasks ==========
  - {name: "br2t_pu_001", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2210001}
  - {name: "br2t_pu_002", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2210002}
  - {name: "br2t_pu_003", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2210003}
  - {name: "br2t_pu_004", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2210004}
  - {name: "br2t_pu_005", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2210005}

  # ========== gradient_perturbation (gp) — 5 tasks ==========
  - {name: "br2t_gp_001", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 2, seed: 2220001}
  - {name: "br2t_gp_002", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 3, seed: 2220002}
  - {name: "br2t_gp_003", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 4, seed: 2220003}
  - {name: "br2t_gp_004", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 5, seed: 2220004}
  - {name: "br2t_gp_005", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 2, seed: 2220005}

  # ========== random_smooth (rs) — 5 tasks ==========
  - {name: "br2t_rs_001", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2230001}
  - {name: "br2t_rs_002", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2230002}
  - {name: "br2t_rs_003", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2230003}
