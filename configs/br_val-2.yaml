# Brusselator Validation Configuration v2
# 14 tasks: 8 pu + 4 gp + 2 rs
# Same parameter ranges and regime as br_train-2

simulation:
  name: "br_val-2"

  D_A: 2.0
  D_B: 16.0
  k1: 4.5
  k2: 7.0

  domain_size: [50.0, 50.0]
  resolution: [128, 128]

  t_end: 2.0
  dt: 0.001
  save_interval: 0.02

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== perturbed_uniform (pu) — 8 tasks ==========
  - {name: "br2v_pu_001", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700001}
  - {name: "br2v_pu_002", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700002}
  - {name: "br2v_pu_003", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700003}
  - {name: "br2v_pu_004", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700004}
  - {name: "br2v_pu_005", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700005}
  - {name: "br2v_pu_006", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700006}
  - {name: "br2v_pu_007", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700007}
  - {name: "br2v_pu_008", type: "perturbed_uniform", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 700008}

  # ========== gradient_perturbation (gp) — 4 tasks ==========
  - {name: "br2v_gp_001", type: "gradient_perturbation", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 2, seed: 710001}
  - {name: "br2v_gp_002", type: "gradient_perturbation", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 3, seed: 710002}
  - {name: "br2v_gp_003", type: "gradient_perturbation", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 4, seed: 710003}
  - {name: "br2v_gp_004", type: "gradient_perturbation", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 5, seed: 710004}

  # ========== random_smooth (rs) — 2 tasks ==========
  - {name: "br2v_rs_001", type: "random_smooth", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 720001}
  - {name: "br2v_rs_002", type: "random_smooth", D_A: [0.5, 3.0], D_B: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 720002}
