# Brusselator Validation Configuration v2
# 5 tasks: 1 pu + 2 gp + 2 rs
# Same parameter ranges and regime as br_train-2

simulation:
  name: "br_val-2"

  D_u: 2.0
  D_v: 16.0
  k1: 4.5
  k2: 7.0

  domain_size: [50.0, 50.0]
  resolution: [512, 512]

  t_end: 2.0
  dt: 0.005
  save_interval: 0.04

output:
  base_dir: "data/datasets"

initial_conditions:
  # ========== perturbed_uniform (pu) — 1 task ==========
  - {name: "br2v_pu_001", type: "perturbed_uniform", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, seed: 2110001}

  # ========== gradient_perturbation (gp) — 2 tasks ==========
  - {name: "br2v_gp_001", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 2, seed: 2120001}
  - {name: "br2v_gp_002", type: "gradient_perturbation", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], gradient_amplitude: 0.15, n_modes: 3, seed: 2120002}

  # ========== random_smooth (rs) — 2 tasks ==========
  - {name: "br2v_rs_001", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2130001}
  - {name: "br2v_rs_002", type: "random_smooth", D_u: [0.5, 3.0], D_v: [10, 28], k2_delta: [1, 3], perturbation_amplitude: 0.05, smoothing_scale: 3.0, seed: 2130002}
