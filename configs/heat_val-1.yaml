# Heat Equation Validation Configuration v1
# 14 tasks: 4 gb + 4 mb + 3 rp + 3 ss

simulation:
  name: "heat_val-1"
  D: 1.0
  domain_size: [6.283185307179586, 6.283185307179586]
  resolution: [128, 128]
  t_end: 5.0
  dt: 0.01
  save_interval: 0.1

output:
  base_dir: "data/datasets"

initial_conditions:
  - {name: "heat_gb_v01", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.35, amplitude: 1.1, seed: 340001}
  - {name: "heat_gb_v02", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.55, amplitude: 0.9, seed: 340002}
  - {name: "heat_gb_v03", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.45, amplitude: 1.4, seed: 340003}
  - {name: "heat_gb_v04", type: "gaussian_bump", D: [0.1, 2.0], sigma: 0.65, amplitude: 1.7, seed: 340004}

  - {name: "heat_mb_v01", type: "multi_bump", D: [0.1, 2.0], n_bumps: 3, sigma_range: [0.25, 0.65], seed: 350001}
  - {name: "heat_mb_v02", type: "multi_bump", D: [0.1, 2.0], n_bumps: 5, sigma_range: [0.15, 0.55], seed: 350002}
  - {name: "heat_mb_v03", type: "multi_bump", D: [0.1, 2.0], n_bumps: 4, sigma_range: [0.2, 0.7], seed: 350003}
  - {name: "heat_mb_v04", type: "multi_bump", D: [0.1, 2.0], n_bumps: 2, sigma_range: [0.3, 0.6], seed: 350004}

  - {name: "heat_rp_v01", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.6, n_modes: 9, seed: 360001}
  - {name: "heat_rp_v02", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.8, n_modes: 11, seed: 360002}
  - {name: "heat_rp_v03", type: "random_perturbation", D: [0.1, 2.0], amplitude: 0.4, n_modes: 7, seed: 360003}

  - {name: "heat_ss_v01", type: "sine_superposition", D: [0.1, 2.0], modes: 3, seed: 370001}
  - {name: "heat_ss_v02", type: "sine_superposition", D: [0.1, 2.0], modes: 4, seed: 370002}
  - {name: "heat_ss_v03", type: "sine_superposition", D: [0.1, 2.0], modes: 5, seed: 370003}
