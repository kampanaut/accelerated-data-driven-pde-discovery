experiment:
  name: heat-4-k10-baseline-sin
  pde_type: heat
  seed: 42
  device: cuda
output:
  base_dir: data/models/mlp
data:
  meta_train_dir: data/datasets/heat_train-1
  meta_val_dir: data/datasets/heat_val-1
  meta_test_dir: data/datasets/heat_test-1
training:
  inner_lr: 0.01
  outer_lr: 0.001
  adam_betas:
  - 0.9
  - 0.99
  inner_steps: 5
  meta_batch_size: 25
  k_shot: 10
  query_size: 2000
  max_iterations: 15000
  patience: 0
  checkpoint_interval: 100
  log_interval: 1
  hidden_dims:
  - 100
  - 100
  activation: sin
  input_dim: 5
  output_dim: 1
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 5000
  lslr_enabled: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: warm_restarts
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-05
  loss_function: normalized_mse
  max_grad_norm: 100.0
  zero_non_rhs_features: true
evaluation:
  k_values:
  - 10
  noise_levels:
  - 0.0
  fine_tune_lr: 0.01
  max_steps: 50
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 50
  holdout_size: 5000
  log_weights: false
visualization:
  dpi: 300
  only: scatter[0,1,2,3,4,5,50],jacobian[0,5,50],generalization,best-combo
  compare_experiments:
  - heat-2-k800-baseline-sin
  - heat-4-k10-baseline-sin
  exclude_suffixes_append: []
  exclude_max_iteration: 20
