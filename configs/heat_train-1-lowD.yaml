# Heat Equation Low-D Supplement
# 8 tasks: 2 gb + 2 mb + 2 rp + 2 ss
# u_t = D * nabla^2(u), D sampled per-task from [0.00001, 0.3]
# Appends to heat_train-1 directory

simulation:
  name: "heat_train-1"

  D: 1.0

  domain_size: [6.283185307179586, 6.283185307179586]  # 2*pi
  resolution: [512, 512]

  t_end: 5.0
  dt: 0.005
  save_interval: 0.1

output:
  base_dir: "data/datasets"

# ============================================================================
# Initial Conditions: 2 gb + 2 mb + 2 rp + 2 ss = 8 tasks
# ============================================================================
initial_conditions:
  # ========== gaussian_bump (gb) — 2 tasks ==========
  - {name: "heat_gb_lowD_001", type: "gaussian_bump", D: [0.00001, 0.3], sigma: 0.4, amplitude: 1.2, seed: 5010008}
  - {name: "heat_gb_lowD_002", type: "gaussian_bump", D: [0.00001, 0.3], sigma: 0.6, amplitude: 0.9, seed: 5010009}

  # ========== multi_bump (mb) — 2 tasks ==========
  - {name: "heat_mb_lowD_001", type: "multi_bump", D: [0.00001, 0.3], n_bumps: 4, sigma_range: [0.2, 0.5], seed: 5020008}
  - {name: "heat_mb_lowD_002", type: "multi_bump", D: [0.00001, 0.3], n_bumps: 3, sigma_range: [0.3, 0.7], seed: 5020009}

  # ========== random_perturbation (rp) — 2 tasks ==========
  - {name: "heat_rp_lowD_001", type: "random_perturbation", D: [0.00001, 0.3], amplitude: 0.6, n_modes: 10, seed: 5030008}
  - {name: "heat_rp_lowD_002", type: "random_perturbation", D: [0.00001, 0.3], amplitude: 0.8, n_modes: 8, seed: 5030009}

  # ========== sine_superposition (ss) — 2 tasks ==========
  - {name: "heat_ss_lowD_001", type: "sine_superposition", D: [0.00001, 0.3], modes: 3, seed: 5040008}
  - {name: "heat_ss_lowD_002", type: "sine_superposition", D: [0.00001, 0.3], modes: 4, seed: 5040009}
