# Configuration for Kelvin-Helmholtz shear layer
# Creates instability due to velocity shear

simulation:
  nu: 0.001  # Lower viscosity to see K-H rolls
  domain_size: [6.283185307179586, 6.283185307179586]  # 2π × 2π
  resolution: [32, 64]
  t_end: 15.0
  dt: 0.01
  save_interval: 0.3

output_dir: "shear_layer"

initial_conditions:
  - name: "kh_instability"
    type: "shear_layer"
    y_center: 3.141592653589793  # π (middle of domain)
    thickness: 0.3
    velocity_jump: 2.0
    perturbation_amplitude: 0.1
