simulation:
  name: "ns_test-1"                  # Output: {base_dir}/{name}/
  nu: [0.01, 0.025]                            # Viscosity (or [min, max] to sample)
  domain_size: [6.283185, 6.283185]   # 2pi x 2pi
  resolution: [128, 128]                # ny x nx grid
  t_end: 7.0                         # Simulation end time
  dt: 0.001                            # Timestep
  save_interval: 0.2                  # Snapshot frequency

initial_conditions:
  # ==========================================================================
  # IN-DISTRIBUTION (8 tasks, seeds 86-93)
  # ==========================================================================

  # gv (gaussian_vortex) - 2 tasks, seeds 86-87, n_gaussians 5-10
  # ==========================================================================
  - name: "gv_n7_s86_086"
    type: "gaussian_vortex"
    n_gaussians: 7
    amplitude_range: [-2.0, 2.0]
    width_range: [0.2, 1.5]
    seed: 86

  - name: "gv_n9_s87_087"
    type: "gaussian_vortex"
    n_gaussians: 9
    amplitude_range: [-2.0, 2.0]
    width_range: [0.2, 1.5]
    seed: 87

  # gd (gaussian_direct) - 2 tasks, seeds 88-89, n_total 6-12
  # ==========================================================================
  - name: "gd_n8_s88_088"
    type: "gaussian_direct"
    n_gaussians_u: 4
    n_gaussians_v: 4
    amplitude_range: [-2.0, 2.0]
    width_range: [0.3, 1.2]
    seed: 88

  - name: "gd_n10_s89_089"
    type: "gaussian_direct"
    n_gaussians_u: 5
    n_gaussians_v: 5
    amplitude_range: [-2.0, 2.0]
    width_range: [0.3, 1.2]
    seed: 89

  # gh (gaussian_hybrid) - 2 tasks, seeds 90-91, n_gaussians_vorticity 5-10
  # ==========================================================================
  - name: "gh_n6_s90_090"
    type: "gaussian_hybrid"
    n_gaussians_vorticity: 6
    n_gaussians_u: 4
    n_gaussians_v: 4
    amplitude_range: [-1.5, 1.5]
    width_range: [0.3, 1.2]
    alpha: 0.65
    beta: 0.35
    seed: 90

  - name: "gh_n8_s91_091"
    type: "gaussian_hybrid"
    n_gaussians_vorticity: 8
    n_gaussians_u: 3
    n_gaussians_v: 3
    amplitude_range: [-1.5, 1.5]
    width_range: [0.3, 1.2]
    alpha: 0.7
    beta: 0.3
    seed: 91

  # rs (random_soup) - 1 task, seed 92, n_vortices 8-15
  # ==========================================================================
  - name: "rs_n11_s92_092"
    type: "random_soup"
    n_vortices: 11
    strength_range: [-1.5, 1.5]
    width_range: [0.2, 0.8]
    seed: 92

  # pf (perturbed_flow) - 1 task, seed 93, wavelength 1.5
  # ==========================================================================
  - name: "pf_w1.5_s93_093"
    type: "perturbed_flow"
    u_mean: 0.5
    v_mean: 0.0
    perturbation_amplitude: 0.15
    perturbation_wavelength: 1.5
    seed: 93

  # ==========================================================================
  # OUT-OF-DISTRIBUTION (22 tasks, seeds 94-115)
  # ==========================================================================

  # dp (dipole) - 4 tasks, seeds 94-97
  # ==========================================================================
  - name: "dp_sep1.2_s94_094"
    type: "dipole"
    center: [3.14, 3.14]
    separation: 1.2
    width: 0.4
    strength: 1.0
    seed: 94

  - name: "dp_sep1.5_s95_095"
    type: "dipole"
    center: [3.14, 3.14]
    separation: 1.5
    width: 0.5
    strength: 1.2
    seed: 95

  - name: "dp_sep1.8_s96_096"
    type: "dipole"
    center: [3.14, 3.14]
    separation: 1.8
    width: 0.3
    strength: 0.8
    seed: 96

  - name: "dp_sep2.0_s97_097"
    type: "dipole"
    center: [3.14, 3.14]
    separation: 2.0
    width: 0.6
    strength: 1.5
