  # lo (lamb_oseen) - 3 tasks, seeds 110-112
  # ==========================================================================
  - name: "lo_rad0.5_s110_110"
    type: "lamb_oseen"
    center: [3.14, 3.14]
    core_radius: 0.5
    circulation: 2.0
    seed: 110

  - name: "lo_rad0.6_s111_111"
    type: "lamb_oseen"
