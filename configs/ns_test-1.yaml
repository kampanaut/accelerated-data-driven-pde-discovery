  # vk (von_karman) - 4 tasks, seeds 106-109
  # ==========================================================================
  - name: "vk_n6_s106_106"
    type: "von_karman"
    n_vortices: 6
    spacing: 1.0
    offset: 2.0
    width: 0.4
    strength: 1.0
    seed: 106

  - name: "vk_n8_s107_107"
    type: "von_karman"
    n_vortices: 8
    spacing: 1.2
    offset: 2.0
    width: 0.4
    strength: 1.2
    seed: 107

  - name: "vk_n10_s108_108"
    type: "von_karman"
    n_vortices: 10
    spacing: 1.4
    offset: 2.0
    width: 0.4
