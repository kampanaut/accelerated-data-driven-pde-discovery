    thickness: 0.45
    velocity_jump: 2.8
    perturbation_amplitude: 0.15
    seed: 104

  - name: "sl_thick0.5_s105_105"
    type: "shear_layer"
    y_center: 3.14
    thickness: 0.5
    velocity_jump: 3.0
