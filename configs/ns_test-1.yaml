  # tg (taylor_green) - 4 tasks, seeds 98-101
  # ==========================================================================
  - name: "tg_amp0.8_s98_098"
    type: "taylor_green"
    amplitude: 0.8
    seed: 98

  - name: "tg_amp1.2_s99_099"
    type: "taylor_green"
    amplitude: 1.2
    seed: 99

  - name: "tg_amp1.6_s100_100"
    type: "taylor_green"
    amplitude: 1.6
    seed: 100

  - name: "tg_amp1.7_s101_101"
    type: "taylor_green"
    amplitude: 1.7
    seed: 101

  # sl (shear_layer) - 4 tasks, seeds 102-105
  # ==========================================================================
  - name: "sl_thick0.25_s102_102"
    type: "shear_layer"
