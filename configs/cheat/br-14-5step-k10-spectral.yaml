experiment:
  name: br-14-5step-k10-spectral
  pde_type: br
  seed: 42
  device: cuda
output:
  base_dir: data/models/cheat/br
data:
  meta_train_dir: data/datasets/br_train-2
  meta_val_dir: data/datasets/br_val-2
  meta_test_dir: data/datasets/br_test-2
training:
  inner_lr: 0.0001
  outer_lr: 0.001
  adam_betas:
  - 0.9
  - 0.99
  inner_steps: 5
  meta_batch_size: 8
  k_shot: 10
  query_size: 2000
  max_iterations: 500
  patience: 300
  checkpoint_interval: 0
  log_interval: 1
  layers:
  - input: 10
  - output: 2
    bias: false
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 5000
  lslr_enabled: false
  warmup_iterations: 100
  use_scheduler: true
  scheduler_type: warm_restarts
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-05
  loss_function: normalized_mse
  max_grad_norm: 100.0
  zero_non_rhs_features: false
  spectral_loss:
    enabled: true
    mode_size: 32
evaluation:
  k_values:
  - 10
  noise_levels:
  - 0.0
  - 0.01
  - 0.05
  - 0.1
  fine_tune_lr: 1.0e-05
  max_steps: 1000
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 5
  - 10
  - 25
  - 50
  - 100
  - 250
  - 500
  - 1000
  holdout_size: 5000
  log_weights: true
visualization:
  dpi: 300
  only: scatter[0,5,10,25,50,100,250,500,1000],jacobian[0,5,10,50,100,500,1000],generalization,best-combo
  compare_experiments:
  - br-13-5step-k800-spectral
  - br-14-5step-k10-spectral
  exclude_suffixes_append: []
  exclude_max_iteration: 20
