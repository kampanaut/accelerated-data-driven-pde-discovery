experiment:
  name: nl_heat-pt3-7-noaux-30step
  pde_type: nl_heat
  seed: 6000000
  device: cuda
output:
  base_dir: data/models/the-finals-sobol/runpod-1
data:
  meta_train_dir: data/datasets/nl_heat_train-2
  meta_val_dir: data/datasets/nl_heat_val-1
  meta_test_dir: data/datasets/nl_heat_test-1
training:
  inner_lr: 0.01
  outer_lr: 0.0035
  adam_betas:
  - 0.9
  - 0.999
  inner_steps: 30
  meta_batch_size: 28
  k_shot: 4000
  query_size: 20000
  epochs: 1
  max_iterations: 2000
  patience: 0
  checkpoint_interval: 100
  log_interval: 20
  hidden_dims:
  - 100
  - 120
  - 150
  - 450
  activation: silu
  input_dim: 2
  output_dim: 1
  input_bypass: false
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 5000
  lslr_enabled: false
  warmup_iterations: 0
  use_scheduler: true
  scheduler_type: polynomial
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-07
  poly_power: 3.0
  plateau_factor: 0.8
  plateau_patience: 70
  plateau_cooldown: 40
  plateau_threshold: 0.001
  plateau_window: 20
  loss_function: normalized_mse
  max_grad_norm: 10.0
  aux_losses_enabled: false
  imaml:
    enabled: true
    lam: 0.005
    lam_lr: 0.0
    lam_min: 0.0
    cg_steps: 10
    cg_damping: 1.0
    inner_optimizer: lbfgs
    outer_optimizer: adam
    outer_lbfgs_after: 0
    anil: true
    proximal_every_step: false
evaluation:
  k_values:
  - 4000
  noise_levels:
  - 0.0
  - 0.01
  - 0.05
  - 0.1
  fine_tune_lr: 0.01
  max_steps: 30
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 30
  holdout_size: 20000
  log_weights: false
visualization:
  dpi: 300
  only: ""
  compare_experiments:
  - nl_heat-pt3-7-noaux-30step
  exclude_suffixes_append: []
  exclude_max_iteration: 20
