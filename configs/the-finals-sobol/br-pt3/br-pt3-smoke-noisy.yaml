experiment:
  name: br-pt3-smoke-noisy
  pde_type: br
  seed: 42
  device: cuda
output:
  base_dir: data/models/the-finals-sobol/br-pt3
data:
  meta_train_dir: data/datasets/br_train-2
  meta_val_dir: data/datasets/br_val-2
  meta_test_dir: data/datasets/br_test-2
training:
  inner_lr: 0.01
  outer_lr: 0.01
  adam_betas:
  - 0.9
  - 0.999
  inner_steps: 16
  meta_batch_size: 25
  k_shot: 1000
  query_size: 10000
  epochs: 1
  max_iterations: 10
  patience: 0
  checkpoint_interval: 10
  log_interval: 1
  hidden_dims:
  - 350
  - 350
  activation: silu
  input_dim: 2
  output_dim: 1
  input_bypass: false
  first_order: false
  msl_enabled: false
  da_enabled: false
  da_threshold: 5000
  lslr_enabled: false
  warmup_iterations: 0
  use_scheduler: true
  scheduler_type: polynomial
  T_0: 200
  T_mult: 2
  min_lr: 1.0e-07
  poly_power: 3.0
  plateau_factor: 0.8
  plateau_patience: 70
  plateau_cooldown: 40
  plateau_threshold: 0.001
  plateau_window: 20
  loss_function: normalized_mse
  max_grad_norm: 0.0
  aux_losses_enabled: false
  noise_augmentation:
    enabled: true
    range: [0.0, 0.1]
  imaml:
    enabled: true
    lam: 0.005
    lam_lr: 0.0
    lam_min: 0.0
    cg_steps: 10
    cg_damping: 1.0
    inner_optimizer: lbfgs
    outer_optimizer: adam
    outer_lbfgs_after: 0
    anil: true
    proximal_every_step: false
evaluation:
  k_values:
  - 1000
  noise_levels:
  - 0.0
  fine_tune_lr: 0.01
  max_steps: 16
  deriv_threshold: 0.0005
  fixed_steps:
  - 0
  - 16
  holdout_size: 10000
  log_weights: false
visualization:
  dpi: 300
  only: ""
  compare_experiments: []
  exclude_suffixes_append: []
  exclude_max_iteration: 20
