# Nonlinear Heat Equation Validation Configuration v1
# 5 tasks: 1 gb + 1 mb + 1 rp + 2 ss

simulation:
  name: "nl_heat_val-1"
  K: 1.0
  domain_size: [6.283185307179586, 6.283185307179586]
  resolution: [512, 512]
  t_end: 5.0
  dt: 0.005
  save_interval: 0.1

output:
  base_dir: "data/datasets"

initial_conditions:
  # NOTE: amplitude must stay < 1.0 for nl_heat
  # ========== gaussian_bump (gb) — 1 task ==========
  - {name: "nlh_gb_v01", type: "gaussian_bump", K: [0.1, 2.0], sigma: 0.35, amplitude: 0.75, seed: 6110001}

  # ========== multi_bump (mb) — 1 task ==========
  - {name: "nlh_mb_v01", type: "multi_bump", K: [0.1, 2.0], n_bumps: 3, sigma_range: [0.25, 0.65], seed: 6120001}

  # ========== random_perturbation (rp) — 1 task ==========
  - {name: "nlh_rp_v01", type: "random_perturbation", K: [0.1, 2.0], amplitude: 0.2, n_modes: 9, seed: 6130001}

  # ========== sine_superposition (ss) — 2 tasks ==========
  - {name: "nlh_ss_v01", type: "sine_superposition", K: [0.1, 2.0], modes: 3, seed: 6140001}
  - {name: "nlh_ss_v02", type: "sine_superposition", K: [0.1, 2.0], modes: 4, seed: 6140002}
