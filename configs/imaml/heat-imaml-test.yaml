experiment:
  name: heat-imaml-test
  pde_type: heat
  seed: 42
  device: cuda
output:
  base_dir: data/models/imaml
data:
  meta_train_dir: data/datasets/heat_train-1
  meta_val_dir: data/datasets/heat_val-1
  meta_test_dir: data/datasets/heat_test-1
training:
  inner_lr: 0.01
  outer_lr: 0.001
  adam_betas:
  - 0.9
  - 0.99
  inner_steps: 5
  meta_batch_size: 4
  k_shot: 800
  query_size: 1600
  max_iterations: 50
  patience: 0
  checkpoint_interval: 25
  log_interval: 1
  hidden_dims:
  - 100
  - 100
  activation: silu
  input_dim: 5
  output_dim: 1
  first_order: false
  loss_function: normalized_mse
  max_grad_norm: 100.0
  zero_non_rhs_features: true
  imaml:
    enabled: true
    lam: 2.0
    lam_lr: 0.0
    lam_min: 0.0
    cg_steps: 5
    cg_damping: 1.0
    inner_optimizer: sgd
    proximal_every_step: false
evaluation:
  k_values:
  - 800
  noise_levels:
  - 0.0
  fine_tune_lr: 0.01
  max_steps: 50
  holdout_size: 5000
